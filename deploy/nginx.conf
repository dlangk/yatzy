server {
    listen 8090;
    server_name _;
    index index.html;
    absolute_redirect off;

    # Chart data (JSON). Must NOT SPA-fallback to index.html: a missing data
    # file has to return a real 404, not 200+HTML, or browsers cache the HTML
    # under the .json URL and the chart's JSON.parse fails until a hard reload.
    # Revalidate so a corrected file is picked up without a manual cache clear.
    location /data/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Treatise at root (volume-mounted)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /play → /play/ and /profile → /profile/
    # Use absolute paths with /yatzy/ prefix since outer nginx strips it
    location = /play  { return 301 /yatzy/play/; }
    location = /profile { return 301 /yatzy/profile/; }
    location = /probabilities { return 301 /yatzy/probabilities/; }

    # Game UI (baked into image)
    location /play/ {
        alias /usr/share/nginx/apps/play/;
        try_files $uri $uri/ /play/index.html;
    }

    # Profiler quiz (baked into image)
    location /profile/ {
        alias /usr/share/nginx/apps/profile/;
        try_files $uri $uri/ /profile/index.html;
    }

    # Probabilities tool (baked into image)
    location /probabilities/ {
        alias /usr/share/nginx/apps/probabilities/;
        try_files $uri $uri/ /probabilities/index.html;
    }

    # No-cache for runtime config
    location = /play/config.js {
        alias /usr/share/nginx/apps/play/config.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
