<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Die body -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <!-- Five dots (like a standard die face showing 5) -->
  <!-- Top-left -->
  <circle cx="9" cy="9" r="3" fill="#f37021"/>
  <!-- Top-right -->
  <circle cx="23" cy="9" r="3" fill="#f37021"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="3" fill="#f37021"/>
  <!-- Bottom-left -->
  <circle cx="9" cy="23" r="3" fill="#f37021"/>
  <!-- Bottom-right -->
  <circle cx="23" cy="23" r="3" fill="#f37021"/>
</svg>
